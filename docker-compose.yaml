services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boostflow-app
    restart: always
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./uploads:/app/uploads

  minio:
    image: minio/minio:latest
    container_name: boostflow-minio
    restart: always
    env_file:
      - .env.local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  minio-data:
    driver: local
