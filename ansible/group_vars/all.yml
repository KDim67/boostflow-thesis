app_namespace: boostflow
monitoring_namespace: monitoring
argocd_namespace: argocd
awx_namespace: awx
backup_namespace: backup
compliance_namespace: compliance

ghcr_registry: ghcr.io
ghcr_username: kdim67
app_image: ghcr.io/kdim67/boostflow

kubernetes_version: "1.31.4"
kubernetes_version_repo: v1.31
kubernetes_package_version: "1.31.4-1.1"
pod_network_cidr: "192.168.0.0/16"
calico_version: v3.29.2

helm_charts:
  ingress_nginx:
    repo: https://kubernetes.github.io/ingress-nginx
    name: ingress-nginx
    version: 4.12.1
    namespace: ingress-nginx
  argocd:
    repo: https://argoproj.github.io/argo-helm
    name: argo-cd
    version: 7.8.13
    namespace: argocd
  awx_operator:
    repo: https://ansible-community.github.io/awx-operator-helm/
    name: awx-operator
    version: 2.19.1
    namespace: awx
  kyverno:
    repo: https://kyverno.github.io/kyverno/
    name: kyverno
    version: 3.3.4
    namespace: kyverno
  vault:
    repo: https://helm.releases.hashicorp.com
    name: vault
    version: 0.28.1
    namespace: vault
  vault_secrets_operator:
    repo: https://helm.releases.hashicorp.com
    name: vault-secrets-operator
    version: 0.9.1
    namespace: vault-secrets-operator

vault_namespace: vault
vault_addr_internal: "http://vault.vault.svc:8200"
vault_seed: false
vault_kv_mount: secret
vault_jenkins_token_file: "/home/{{ real_user.stdout }}/.vault-jenkins-token"
vault_jenkins_token_period: "72h"
vault_k8s_app_role_name: boostflow-app

cosign_image_pattern: "ghcr.io/kdim67/boostflow*"

git_repo_url: https://github.com/KDim67/boostflow-thesis.git
git_repo_branch: main
use_vault_for_secrets: true
