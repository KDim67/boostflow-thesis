---
- name: Provision BoostFlow Kubernetes Cluster
  hosts: all
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Load local secrets if present on control node
      include_vars:
        file: ../secrets.vault.yml
      failed_when: false
      tags: always

    - name: Check if secrets.vault.yml exists on target VM
      stat:
        path: /home/azureuser/boostflow-thesis/ansible/secrets.vault.yml
      register: vm_secrets_stat
      when: cosign_public_key is not defined
      tags: always

    - name: Fetch secrets.vault.yml from target VM
      fetch:
        src: /home/azureuser/boostflow-thesis/ansible/secrets.vault.yml
        dest: /tmp/secrets.vault.yml
        flat: yes
      when:
        - cosign_public_key is not defined
        - vm_secrets_stat.stat.exists | default(false)
      no_log: true
      tags: always

    - name: Load fetched secrets file on control node
      include_vars:
        file: /tmp/secrets.vault.yml
      when:
        - cosign_public_key is not defined
        - vm_secrets_stat.stat.exists | default(false)
      tags: always

    - name: Clean up temporary secrets file on control node
      file:
        path: /tmp/secrets.vault.yml
        state: absent
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false
      when:
        - cosign_public_key is not defined
        - vm_secrets_stat.stat.exists | default(false)
      tags: always

    - name: Get actual non-root username
      command: whoami
      become: false
      register: real_user
      changed_when: false
      tags: always

    - name: Disable swap (required by kubelet)
      command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: '\sswap\s'
        state: absent

    - name: Load required kernel modules
      command: modprobe {{ item }}
      loop:
        - overlay
        - br_netfilter
      changed_when: false

    - name: Persist kernel modules across reboots
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Set sysctl parameters for Kubernetes networking
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward, value: "1" }
        - { key: vm.overcommit_memory, value: "1" }
        - { key: kernel.panic, value: "10" }
        - { key: kernel.panic_on_oops, value: "1" }

    - name: Install required system packages
      apt:
        name:
          - curl
          - apt-transport-https
          - ca-certificates
          - gnupg
          - containerd
        state: present

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Ensure CRI plugin is not disabled in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: 'disabled_plugins = \["cri"\]'
        replace: "disabled_plugins = []"
      register: cri_fix

    - name: Enable SystemdCgroup in containerd
      replace:
        path: /etc/containerd/config.toml
        regexp: "SystemdCgroup = false"
        replace: "SystemdCgroup = true"
      register: containerd_config

    - name: Create containerd systemd override directory
      file:
        path: /etc/systemd/system/containerd.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Configure containerd dependency on NVMe mount
      template:
        src: files/containerd-override.conf
        dest: /etc/systemd/system/containerd.service.d/override.conf
        owner: root
        group: root
        mode: "0644"
      register: containerd_override

    - name: Reload systemd daemon for containerd override
      systemd:
        daemon_reload: yes
      when: containerd_override.changed

    - name: Restart containerd after config or override change
      systemd:
        name: containerd
        state: restarted
        enabled: true
      when: containerd_config.changed or cri_fix.changed or containerd_override.changed

    - name: Enable and start containerd
      systemd:
        name: containerd
        state: started
        enabled: true

    - name: Copy containerd watchdog script
      template:
        src: files/containerd-watchdog.sh
        dest: /usr/local/bin/containerd-watchdog.sh
        owner: root
        group: root
        mode: "0755"

    - name: Create containerd watchdog systemd service
      template:
        src: files/containerd-watchdog.service
        dest: /etc/systemd/system/containerd-watchdog.service
        owner: root
        group: root
        mode: "0644"
      register: watchdog_service

    - name: Create containerd watchdog systemd timer
      template:
        src: files/containerd-watchdog.timer
        dest: /etc/systemd/system/containerd-watchdog.timer
        owner: root
        group: root
        mode: "0644"
      register: watchdog_timer

    - name: Reload systemd for containerd watchdog
      systemd:
        daemon_reload: yes
      when: watchdog_service.changed or watchdog_timer.changed

    - name: Enable and start containerd watchdog timer
      systemd:
        name: containerd-watchdog.timer
        state: started
        enabled: yes

    - name: Configure logrotate for containerd watchdog
      template:
        src: files/containerd-watchdog.logrotate
        dest: /etc/logrotate.d/containerd-watchdog
        owner: root
        group: root
        mode: "0644"

    - name: Create graceful shutdown hook script
      template:
        src: files/kube-clean-shutdown.sh
        dest: /usr/local/bin/kube-clean-shutdown.sh
        owner: root
        group: root
        mode: "0755"

    - name: Create graceful shutdown hook systemd service
      template:
        src: files/kube-clean-shutdown.service
        dest: /etc/systemd/system/kube-clean-shutdown.service
        owner: root
        group: root
        mode: "0644"
      register: shutdown_service

    - name: Reload systemd for graceful shutdown service
      systemd:
        daemon_reload: yes
      when: shutdown_service.changed

    - name: Enable and start graceful shutdown service
      systemd:
        name: kube-clean-shutdown.service
        enabled: yes
        state: started

    - name: Add Kubernetes apt signing key
      shell: >
        curl -fsSL https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version_repo }}/deb/Release.key
        | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg --yes

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version_repo }}/deb/ /\n"

    - name: Update apt cache
      shell: apt-get update || true
      changed_when: false

    - name: Install kubeadm, kubelet, kubectl
      apt:
        name:
          - kubelet={{ kubernetes_package_version }}
          - kubeadm={{ kubernetes_package_version }}
          - kubectl={{ kubernetes_package_version }}
        state: present

    - name: Hold Kubernetes packages at current version
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Check if cluster is already initialized
      stat:
        path: /etc/kubernetes/admin.conf
      register: kubeadm_conf

    - name: Initialize Kubernetes cluster with kubeadm
      command: >
        kubeadm init
        --pod-network-cidr={{ pod_network_cidr }}
        --kubernetes-version={{ kubernetes_version }}
      when: not kubeadm_conf.stat.exists

    - name: Create .kube directory for user
      file:
        path: "/home/{{ real_user.stdout }}/.kube"
        state: directory
        owner: "{{ real_user.stdout }}"
        mode: "0755"

    - name: Copy kubeconfig to user home
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "/home/{{ real_user.stdout }}/.kube/config"
        remote_src: true
        owner: "{{ real_user.stdout }}"
        mode: "0644"

    - name: Harden kubelet service file permissions
      file:
        path: /lib/systemd/system/kubelet.service
        mode: "0600"
      ignore_errors: true

    - name: Harden kubelet configuration file permissions
      file:
        path: /var/lib/kubelet/config.yaml
        mode: "0600"
      ignore_errors: true

    - name: Enforce protectKernelDefaults in Kubelet
      lineinfile:
        path: /var/lib/kubelet/config.yaml
        line: "protectKernelDefaults: true"
      notify: Restart kubelet
      ignore_errors: true

    - name: Remove control-plane taint (single-node cluster)
      command: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      register: taint_result
      failed_when: >
        taint_result.rc != 0 and
        "not found" not in taint_result.stderr
      changed_when: "'untainted' in taint_result.stdout"

    - name: Install Calico CNI plugin
      command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml
      changed_when: false

    - name: Wait for all nodes to be Ready
      command: kubectl get nodes
      register: nodes_ready
      retries: 20
      delay: 10
      until: "'NotReady' not in nodes_ready.stdout"

    - name: Install Rancher Local Path Provisioner (StorageClass)
      command: kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.30/deploy/local-path-storage.yaml
      changed_when: false

    - name: Mark local-path as default StorageClass
      command: >
        kubectl patch storageclass local-path
        -p '{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
      changed_when: false

    - name: Check if Helm is installed
      command: helm version --short
      register: helm_check
      ignore_errors: true

    - name: Install Helm
      shell: curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_check.rc != 0

    - name: Create application namespaces
      command: "kubectl create namespace {{ item }}"
      loop:
        - "{{ app_namespace }}"
        - "{{ monitoring_namespace }}"
        - "{{ argocd_namespace }}"
        - "{{ awx_namespace }}"
        - "{{ backup_namespace }}"
        - "{{ compliance_namespace }}"
      register: ns_result
      failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

    - name: Apply Pod Security Standards (restricted) to application namespaces
      command: >
        kubectl label namespace {{ item }}
        pod-security.kubernetes.io/enforce=restricted
        pod-security.kubernetes.io/audit=restricted
        pod-security.kubernetes.io/warn=restricted
        --overwrite
      loop:
        - "{{ app_namespace }}"
        - "{{ backup_namespace }}"

    - name: Apply Pod Security Standards (privileged) to compliance namespace
      command: >
        kubectl label namespace {{ compliance_namespace }}
        pod-security.kubernetes.io/enforce=privileged
        pod-security.kubernetes.io/audit=privileged
        pod-security.kubernetes.io/warn=privileged
        --overwrite

    - name: Add Helm repositories
      command: "helm repo add {{ item.key }} {{ item.value }}"
      loop:
        - { key: ingress-nginx, value: "{{ helm_charts.ingress_nginx.repo }}" }
        - { key: argo, value: "{{ helm_charts.argocd.repo }}" }
        - { key: awx-operator, value: "{{ helm_charts.awx_operator.repo }}" }
        - { key: kyverno, value: "{{ helm_charts.kyverno.repo }}" }
        - {
            key: metrics-server,
            value: "https://kubernetes-sigs.github.io/metrics-server/",
          }
      register: repo_result
      changed_when: "'has been added' in repo_result.stdout"

    - name: Update Helm repositories
      command: helm repo update

    - name: Check if metrics-server is installed
      command: helm status metrics-server -n kube-system
      register: metrics_server_status
      ignore_errors: true
      changed_when: false

    - name: Install metrics-server
      command: >
        helm install metrics-server metrics-server/metrics-server
        --namespace kube-system
        --set args={--kubelet-insecure-tls}
      when: metrics_server_status.rc != 0

    - name: Check if ingress-nginx is installed
      command: helm status ingress-nginx -n {{ helm_charts.ingress_nginx.namespace }}
      register: nginx_status
      ignore_errors: true

    - name: Install NGINX Ingress Controller
      command: >
        helm install ingress-nginx ingress-nginx/ingress-nginx
        --namespace {{ helm_charts.ingress_nginx.namespace }}
        --create-namespace
        --version {{ helm_charts.ingress_nginx.version }}
        --set controller.hostNetwork=true
        --set controller.dnsPolicy=ClusterFirstWithHostNet
        --set controller.service.type=ClusterIP
        --set controller.admissionWebhooks.enabled=false
        --timeout 10m
      when: nginx_status.rc != 0

    - name: Check if ArgoCD is installed
      command: helm status argocd -n {{ argocd_namespace }}
      register: argocd_status
      ignore_errors: true

    - name: Install ArgoCD
      command: >
        helm install argocd argo/argo-cd
        --namespace {{ argocd_namespace }}
        --version {{ helm_charts.argocd.version }}
        --set repoServer.resources.requests.cpu=10m
        --set repoServer.resources.limits.memory=512Mi
        --set controller.resources.requests.cpu=10m
        --set controller.resources.limits.memory=1024Mi
        --set server.resources.requests.cpu=10m
        --set server.resources.limits.memory=512Mi
        --set applicationSet.resources.requests.cpu=10m
        --set applicationSet.resources.limits.memory=512Mi
      when: argocd_status.rc != 0

    - name: Wait for ArgoCD server to be ready
      command: >
        kubectl wait --for=condition=available deployment/argocd-server
        -n {{ argocd_namespace }} --timeout=120s
      when: argocd_status.rc != 0

    - name: Check if AWX Operator is installed
      command: helm status awx-operator -n {{ awx_namespace }}
      register: awx_operator_status
      ignore_errors: true

    - name: Install AWX Operator
      command: >
        helm install awx-operator awx-operator/awx-operator
        --namespace {{ awx_namespace }}
        --version {{ helm_charts.awx_operator.version }}
      when: awx_operator_status.rc != 0

    - name: Patch AWX Operator kube-rbac-proxy image (fix discontinued upstream image)
      command: >
        kubectl set image deployment/awx-operator-controller-manager
        kube-rbac-proxy=quay.io/brancz/kube-rbac-proxy:v0.15.0
        -n {{ awx_namespace }}
      changed_when: false
      when: awx_operator_status.rc != 0

    - name: Wait for AWX Operator to be ready
      command: >
        kubectl wait --for=condition=available deployment/awx-operator-controller-manager
        -n {{ awx_namespace }} --timeout=120s
      when: awx_operator_status.rc != 0

    - name: Check if AWX instance exists
      command: kubectl get awx boostflow-awx -n {{ awx_namespace }}
      register: awx_instance_check
      ignore_errors: true

    - name: Ensure stale AWX migration jobs are removed
      command: kubectl delete jobs -n {{ awx_namespace }} -l app.kubernetes.io/component=migration
      failed_when: false

    - name: Create AWX instance
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: awx.ansible.com/v1beta1
        kind: AWX
        metadata:
          name: boostflow-awx
          namespace: {{ awx_namespace }}
        spec:
          service_type: ClusterIP
          projects_persistence: false
          redis_resource_requirements:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
          task_resource_requirements:
            requests:
              cpu: 10m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          web_resource_requirements:
            requests:
              cpu: 10m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          ee_resource_requirements:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          rsyslog_resource_requirements:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
        EOF
      when: awx_instance_check.rc != 0

    - name: Deploy and configure HashiCorp Vault
      import_role:
        name: ../roles/vault
        defaults_from: main
      tags: vault

    - name: Check if GHCR pull secret exists
      command: kubectl get secret ghcr-pull-secret -n {{ app_namespace }}
      register: ghcr_secret_check
      ignore_errors: true

    - name: Create GHCR image pull secret
      command: >
        kubectl create secret docker-registry ghcr-pull-secret
        --namespace {{ app_namespace }}
        --docker-server={{ ghcr_registry }}
        --docker-username={{ ghcr_username }}
        --docker-password={{ ghcr_pat }}
      when: ghcr_secret_check.rc != 0
      no_log: true

    - name: Create fallback Kubernetes secrets
      when: use_vault_for_secrets | default(false) | bool == false
      block:
        - name: Check if app secrets exist
          command: kubectl get secret boostflow-app-secret -n {{ app_namespace }}
          register: app_secret_check
          ignore_errors: true

        - name: Create application secrets
          command: >
            kubectl create secret generic boostflow-app-secret
            --namespace {{ app_namespace }}
            --from-literal=FIREBASE_SERVICE_ACCOUNT_KEY='{{ firebase_service_account_key }}'
            --from-literal=GEMINI_API_KEY='{{ gemini_api_key }}'
            --from-literal=GOOGLE_CLIENT_ID='{{ google_client_id }}'
            --from-literal=GOOGLE_CLIENT_SECRET='{{ google_client_secret }}'
            --from-literal=GITHUB_CLIENT_ID='{{ github_client_id }}'
            --from-literal=GITHUB_CLIENT_SECRET='{{ github_client_secret }}'
            --from-literal=MINIO_ENDPOINT='minio.{{ app_namespace }}.svc.cluster.local:9000'
            --from-literal=MINIO_EXTERNAL_ENDPOINT='{{ minio_external_endpoint }}'
            --from-literal=MINIO_ROOT_USER='{{ minio_root_user }}'
            --from-literal=MINIO_ROOT_PASSWORD='{{ minio_root_password }}'
            --from-literal=MINIO_USE_SSL='false'
            --from-literal=SENDGRID_API_KEY='{{ sendgrid_api_key }}'
            --from-literal=DEFAULT_FROM_EMAIL='{{ default_from_email }}'
            --from-literal=NODE_ENV='production'
          when: app_secret_check.rc != 0
          no_log: true

        - name: Check if MinIO secret exists
          command: kubectl get secret minio-secret -n {{ app_namespace }}
          register: minio_secret_check
          ignore_errors: true

        - name: Create MinIO secret
          command: >
            kubectl create secret generic minio-secret
            --namespace {{ app_namespace }}
            --from-literal=MINIO_ROOT_USER='{{ minio_root_user }}'
            --from-literal=MINIO_ROOT_PASSWORD='{{ minio_root_password }}'
          when: minio_secret_check.rc != 0

        - name: Check if MinIO backup secret exists
          command: kubectl get secret minio-secret -n {{ backup_namespace }}
          register: minio_backup_secret_check
          ignore_errors: true

        - name: Create MinIO secret in backup namespace
          command: >
            kubectl create secret generic minio-secret
            --namespace {{ backup_namespace }}
            --from-literal=MINIO_ENDPOINT=minio.{{ app_namespace }}.svc.cluster.local:9000
            --from-literal=MINIO_ROOT_USER={{ minio_root_user }}
            --from-literal=MINIO_ROOT_PASSWORD={{ minio_root_password }}
          when: minio_backup_secret_check.rc != 0
          no_log: true

    - name: Fail if cosign_public_key is not provided
      fail:
        msg: >
          cosign_public_key extra-var is required.
          Add it to ansible/secrets.vault.yml as a multi-line
          cosign_public_key value (PEM format).
      when: cosign_public_key is not defined or cosign_public_key | length == 0

    - name: Scale down Kyverno deployments to prevent webhook auto-recreation
      command: kubectl scale deployment -n {{ helm_charts.kyverno.namespace }} --all --replicas=0
      ignore_errors: true

    - name: Clean up existing Kyverno webhooks to prevent upgrade deadlock
      shell: |
        kubectl delete mutatingwebhookconfiguration kyverno-policy-mutating-webhook-cfg kyverno-resource-mutating-webhook-cfg kyverno-verify-mutating-webhook-cfg --ignore-not-found
        kubectl delete validatingwebhookconfiguration kyverno-cleanup-validating-webhook-cfg kyverno-exception-validating-webhook-cfg kyverno-global-context-validating-webhook-cfg kyverno-policy-validating-webhook-cfg kyverno-resource-validating-webhook-cfg kyverno-ttl-validating-webhook-cfg --ignore-not-found
      ignore_errors: true

    - name: Install or upgrade Kyverno
      command: >
        helm upgrade --install kyverno kyverno/kyverno
        --namespace {{ helm_charts.kyverno.namespace }}
        --create-namespace
        --no-hooks
        --version {{ helm_charts.kyverno.version }}
        --set admissionController.replicas=1
        --set backgroundController.replicas=1
        --set cleanupController.replicas=1
        --set reportsController.replicas=1
        --set admissionController.resources.requests.cpu=10m
        --set backgroundController.resources.requests.cpu=10m
        --set cleanupController.resources.requests.cpu=10m
        --set reportsController.resources.requests.cpu=10m
        --set features.forceFailurePolicyIgnore.enabled=true

    - name: Wait for Kyverno admission controller
      command: >
        kubectl wait --for=condition=available deployment/kyverno-admission-controller
        -n {{ helm_charts.kyverno.namespace }} --timeout=300s

    - name: Apply Kyverno GHCR pull secret
      shell: |
        kubectl create secret docker-registry ghcr-pull-secret \
          --namespace {{ helm_charts.kyverno.namespace }} \
          --docker-server={{ ghcr_registry }} \
          --docker-username={{ ghcr_username }} \
          --docker-password={{ ghcr_pat }} \
          --dry-run=client -o yaml | kubectl apply -f -
      no_log: true

    - name: Render Cosign verifyImages ClusterPolicy
      copy:
        dest: /tmp/kyverno-verify-boostflow.yaml
        mode: "0600"
        content: |
          apiVersion: kyverno.io/v1
          kind: ClusterPolicy
          metadata:
            name: verify-boostflow-image-signature
          spec:
            validationFailureAction: Audit
            background: true
            webhookTimeoutSeconds: 30
            failurePolicy: Ignore
            rules:
              - name: check-cosign-signature
                match:
                  any:
                    - resources:
                        kinds:
                          - Pod
                        namespaces:
                          - {{ app_namespace }}
                verifyImages:
                  - imageReferences:
                      - "{{ cosign_image_pattern }}"
                    required: true
                    mutateDigest: false
                    verifyDigest: true
                    imageRegistryCredentials:
                      secrets:
                        - ghcr-pull-secret
                    attestors:
                      - count: 1
                        entries:
                          - keys:
                              publicKeys: |-
          {{ cosign_public_key | indent(22, true) }}

    - name: Apply Cosign verifyImages ClusterPolicy
      command: kubectl apply -f /tmp/kyverno-verify-boostflow.yaml

    - name: Remove rendered policy file
      file:
        path: /tmp/kyverno-verify-boostflow.yaml
        state: absent

    - name: Display ArgoCD initial admin password
      shell: >
        kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret
        -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password
      changed_when: false

    - name: Display AWX admin password
      shell: >
        kubectl -n {{ awx_namespace }} get secret boostflow-awx-admin-password
        -o jsonpath="{.data.password}" | base64 -d
      register: awx_password
      changed_when: false
      ignore_errors: true

    - name: Check if ArgoCD repository secret exists
      command: kubectl get secret boostflow-thesis-config-creds -n {{ argocd_namespace }}
      register: repo_secret_check
      ignore_errors: true

    - name: Create ArgoCD private repository secret (for GitOps sync)
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Secret
        metadata:
          name: boostflow-thesis-config-creds
          namespace: {{ argocd_namespace }}
          labels:
            argocd.argoproj.io/secret-type: repository
        type: Opaque
        stringData:
          url: https://github.com/KDim67/boostflow-thesis-config.git
          username: {{ ghcr_username }}
          password: {{ ghcr_pat }}
        EOF
      when: repo_secret_check.rc != 0
      no_log: true

    - name: Apply ArgoCD Root Application (App-of-Apps)
      command: kubectl apply -f /home/{{ real_user.stdout }}/boostflow-thesis-config/argocd/root-app.yaml
      become: false
      changed_when: true
      ignore_errors: true

    - name: Build custom Jenkins Docker image
      shell: |
        if [ -f /home/{{ real_user.stdout }}/boostflow-thesis/Dockerfile.jenkins ]; then
          docker build -t custom-jenkins -f /home/{{ real_user.stdout }}/boostflow-thesis/Dockerfile.jenkins /home/{{ real_user.stdout }}/boostflow-thesis
        fi
      changed_when: true

    - name: Ensure SonarQube container is running
      shell: |
        if ! docker inspect --type container sonarqube >/dev/null 2>&1; then
          docker run -d --restart always --name sonarqube \
            -p 9000:9000 \
            -v sonarqube_data:/opt/sonarqube/data \
            -v sonarqube_extensions:/opt/sonarqube/extensions \
            sonarqube:25.1.0.102122-community
        else
          docker start sonarqube
        fi
      changed_when: true

    - name: Get host docker group GID
      command: getent group docker
      register: host_docker_group
      changed_when: false

    - name: Set docker GID fact
      set_fact:
        host_docker_gid: "{{ host_docker_group.stdout.split(':')[2] }}"

    - name: Ensure custom Jenkins container is running
      shell: |
        if ! docker inspect --type container jenkins >/dev/null 2>&1; then
          docker run -d --restart always --name jenkins \
            -p 8080:8080 \
            --group-add {{ host_docker_gid }} \
            -v jenkins_home:/var/jenkins_home \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /home/{{ real_user.stdout }}/.kube:/var/jenkins_home/.kube \
            custom-jenkins
        else
          docker start jenkins
        fi
      changed_when: true

    - name: Show post-install information
      debug:
        msg:
          - "Cluster provisioned successfully!"
          - ""
          - "--- ArgoCD ---"
          - "Username: admin"
          - "Password: {{ argocd_password.stdout }}"
          - "UI: https://argocd.boostflow-thesis.me"
          - ""
          - "--- AWX ---"
          - "Username: admin"
          - "Password: {{ awx_password.stdout | default('AWX is still initializing — re-run this task later') }}"
          - "UI: https://awx.boostflow-thesis.me"
          - ""
          - "--- Jenkins ---"
          - "Username: admin"
          - "Retrieve Password: Run 'docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword'"
          - "UI: https://jenkins.boostflow-thesis.me"
          - ""
          - "--- SonarQube ---"
          - "Username: admin"
          - "Password: admin (forces change on first login)"
          - "UI: https://sonarqube.boostflow-thesis.me"
          - ""
          - "--- NeuVector ---"
          - "Username: admin"
          - "Password: admin (forces change on first login)"
          - "UI: https://neuvector.boostflow-thesis.me"
          - ""
          - "--- Grafana ---"
          - "Username: admin"
          - 'Retrieve Password: Run ''kubectl get secret grafana-secret -n monitoring -o jsonpath="{.data.admin-password}" | base64 --decode'''
          - "UI: https://grafana.boostflow-thesis.me"
          - ""
          - "--- MinIO ---"
          - 'Retrieve Username: Run ''kubectl get secret boostflow-minio-secret -n boostflow -o jsonpath="{.data.MINIO_ROOT_USER}" | base64 --decode'''
          - 'Retrieve Password: Run ''kubectl get secret boostflow-minio-secret -n boostflow -o jsonpath="{.data.MINIO_ROOT_PASSWORD}" | base64 --decode'''
          - "UI: https://minio.boostflow-thesis.me"
          - ""
          - "--- Kibana ---"
          - "Authentication: Disabled by default (X-Pack Security off)"
          - "UI: https://kibana.boostflow-thesis.me"
          - ""
          - "ArgoCD will now sync the k8s/ manifests from Git automatically."
          - "Import this Git repo into AWX as a Project to manage future playbook runs via the web UI."

  handlers:
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted

    - name: Restart kubelet
      systemd:
        name: kubelet
        state: restarted
