# BoostFlow SonarQube Configuration
sonar.projectKey=boostflow
sonar.projectName=BoostFlow
sonar.projectVersion=0.1.0

# Source code configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript analysis
sonar.language=ts

# Scoped tsconfig for Sonar
sonar.typescript.tsconfigPaths=tsconfig.sonar.json

# JS environment
sonar.javascript.environments=node,browser

# Node.js heap for analysis bridge
sonar.javascript.node.maxspace=1024

sonar.working.directory=/tmp/.scannerwork

# Exclusions - files that should not be analyzed
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  out/**,\
  build/**,\
  public/**,\
  coverage/**,\
  test-*.js,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  src/app/globals.css,\
  src/instrumentation.ts

# Test file patterns
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**/*.ts

# Coverage report from Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Coverage exclusions - UI pages, components, and server-dependent infrastructure
sonar.coverage.exclusions=\
  src/app/**,\
  src/components/**,\
  src/lib/firebase/**,\
  src/lib/services/**,\
  src/lib/hooks/**,\
  src/lib/stubs/**,\
  src/lib/types/**,\
  src/middleware/**,\
  src/lib/minio/**,\
  src/lib/api/fileStreamHelper.ts,\
  src/instrumentation.ts

# CPD exclusions - pages/layouts have legitimate structural similarity
sonar.cpd.exclusions=\
  src/app/**/*.tsx,\
  src/components/**

# Quality gate - fail on these thresholds
sonar.qualitygate.wait=true