# BoostFlow SonarQube Configuration
sonar.projectKey=boostflow
sonar.projectName=BoostFlow
sonar.projectVersion=0.1.0

# Source code configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript analysis
sonar.language=ts

# Exclusions - files that should not be analyzed
sonar.exclusions=\
  node_modules/**,\
  .next/**,\
  out/**,\
  build/**,\
  public/**,\
  coverage/**,\
  test-*.js,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Test file patterns
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Quality gate - fail on these thresholds
sonar.qualitygate.wait=true
